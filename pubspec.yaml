name: digital_delta
description: Disaster Relief Logistics System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local Database (SQLite + CRDT)
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  sqflite_common_ffi: ^2.3.0

  # Cryptography
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  otp: ^3.1.4
  encrypt: ^5.0.3

  # Mesh Networking (Bluetooth)


  # gRPC + Protobuf
  grpc: ^3.2.4
  protobuf: ^3.1.0

  # Maps (Offline)
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  cached_network_image: ^3.3.0

  # ML (TFLite) - ✅ COMPATIBLE VERSIONS
  
  image: ^4.1.3

  # Routing/Graph
  graphs: ^2.3.1
  collection: ^1.18.0

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  logger: ^2.0.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  json_annotation: ^4.8.1
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/map_tiles/
    - assets/models/
    - assets/protos/
